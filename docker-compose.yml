services:
  db:
    image: mariadb:10.11
    container_name: english_coach_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: english_coach
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATION: utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: english_coach_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: english_coach_backend
    restart: unless-stopped
    # ⚠️ 生产环境建议在反向代理层（如 Nginx/Caddy）启用 HTTPS，
    # 否则前端传入的 AI API Key 将以明文通过网络传输
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql+aiomysql://root:root123@db:3306/english_coach?charset=utf8mb4
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:8501,http://frontend:8501

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: english_coach_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
      - PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  db_data:
  backend_uploads:
